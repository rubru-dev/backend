<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9ff; /* Matches background token */
        }
        .login-card {
            box-shadow: 0px 4px 12px rgba(0,0,0,0.05); /* Level 1 Elevation from style guidance */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-gutter bg-surface-bright text-on-surface">
<!-- Background Decoration (Subtle SaaS style) -->
<div class="fixed inset-0 overflow-hidden -z-10">
<div class="absolute -top-1/4 -right-1/4 w-[500px] h-[500px] bg-primary-fixed opacity-20 blur-[100px] rounded-full"></div>
<div class="absolute -bottom-1/4 -left-1/4 w-[500px] h-[500px] bg-secondary-fixed opacity-10 blur-[100px] rounded-full"></div>
</div>
<!-- Main Login Shell -->
<main class="w-full max-w-[440px] fade-in">
<!-- Brand Identity Section -->
<header class="mb-xl flex items-center gap-md">
<div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center text-on-primary shadow-sm">
<span class="font-headline-md text-headline-md">F</span>
</div>
<div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Fumakilla ERP</h1>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Service Operations</p>
</div>
</header>
<!-- Login Canvas -->
<div class="login-card bg-surface-container-lowest p-xl rounded-xl border border-outline-variant">
<div class="mb-lg">
<span class="font-label-md text-label-md text-primary uppercase tracking-widest block mb-xs">Selamat Datang</span>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-sm">Masuk ke akun Anda</h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Gunakan akun kerja Anda untuk mengakses sistem operasional Fumakilla.
                </p>
</div>
<form action="#" class="space-y-lg" onsubmit="event.preventDefault();">
<!-- Work Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant font-semibold" for="email">Work Email</label>
<div class="relative">
<input class="w-full px-md py-base bg-surface-bright border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md text-body-md outline-none" id="email" placeholder="admin@fumakilla.co.id" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant font-semibold" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full px-md py-base bg-surface-bright border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all font-body-md text-body-md outline-none" id="password" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="group w-full py-md px-lg bg-primary text-on-primary rounded-lg font-body-lg text-body-lg font-semibold shadow-sm hover:shadow-md hover:bg-primary-container transition-all flex items-center justify-center gap-sm" type="submit">
                    Login to Application
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- SSO / Alternative (Optional but completes the UI) -->
<div class="mt-xl pt-lg border-t border-outline-variant">
<button class="w-full py-base px-md border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface flex items-center justify-center gap-sm hover:bg-surface-container-low transition-colors">
<img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAxYcZKmwbb_gL-dO2aJfx84GoXur4zUk6MqR-fPa4sK0Zg9DY7Ix-HlLFqiItDWlrd1o-K4D-U_-16CSmryvF5RBmcNgoy0hklbWnWEDC_gQFQ4eDdeGtFie2g2WOhiD4ISWTjeok1MgEFALuXOY3g85PLpOEp6Xsq971EP4KD-48raNdIxH2Xc-wc6pknn5KN0T1uuJef_YqVUDt1Mm-Q9haVaFAzVAMBDZq1OobpQx7e5Q92bEcV_3pYB8zUYW2mHWOVdh1vYo0"/>
                    Sign in with Corporate SSO
                </button>
</div>
</div>
<!-- Footer Area -->
<footer class="mt-xl text-center space-y-md">
<div class="flex items-center justify-center gap-lg">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Contact Support</a>
<span class="w-1.5 h-1.5 rounded-full bg-outline-variant"></span>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Security Policy</a>
<span class="w-1.5 h-1.5 rounded-full bg-outline-variant"></span>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">System Status</a>
</div>
<p class="font-label-md text-label-md text-outline">
                Fumakilla ERP © 2024 · Internal Service Operations
            </p>
</footer>
</main>
<!-- Illustrative Detail in Background (Optional Micro-interaction) -->
<div class="fixed bottom-margin right-margin hidden md:block opacity-50 hover:opacity-100 transition-opacity">
<div class="bg-surface-container p-md rounded-xl border border-outline-variant flex items-center gap-sm">
<div class="w-2 h-2 rounded-full bg-[#10b981] animate-pulse"></div>
<span class="font-label-md text-label-md text-on-surface-variant">All Systems Operational</span>
</div>
</div>
<script>
        // Micro-interaction for input focus effects
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.querySelector('label').classList.replace('text-on-surface-variant', 'text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.querySelector('label').classList.replace('text-primary', 'text-on-surface-variant');
            });
        });

        // Simple button loading state simulation
        const loginBtn = document.querySelector('button[type="submit"]');
        loginBtn.addEventListener('click', (e) => {
            if(document.querySelector('form').checkValidity()) {
                loginBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating...';
                loginBtn.classList.add('opacity-80', 'cursor-not-allowed');
                setTimeout(() => {
                    loginBtn.innerHTML = 'Login to Application <span class="material-symbols-outlined">arrow_forward</span>';
                    loginBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                    alert('Integration: This would redirect to the Dashboard.');
                }, 1500);
            }
        });
    </script>
</body></html>
